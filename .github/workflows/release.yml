name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
            archive: tar.gz
            experimental: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            archive: tar.gz
            experimental: false
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            archive: tar.gz
            experimental: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            archive: zip
            experimental: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false
            archive: zip
            experimental: false
          - os: windows-latest
            target: i686-pc-windows-msvc
            use_cross: false
            archive: zip
            experimental: false
    continue-on-error: ${{ matrix.experimental }}
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install --locked cross
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}
      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package linux artifact
        if: runner.os != 'Windows'
        run: |
          tar -czf sshuttle-rs-${TARGET}.tar.gz -C target/${TARGET}/release sshuttle-rs
      - name: Package windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target\${env:TARGET}\release\sshuttle-rs.exe -DestinationPath sshuttle-rs-${env:TARGET}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshuttle-rs-${{ matrix.target }}
          path: |
            sshuttle-rs-${{ matrix.target }}.tar.gz
            sshuttle-rs-${{ matrix.target }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/sshuttle-rs-*
          generate_release_notes: true
