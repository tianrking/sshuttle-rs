version: 1
defaults:
  action: proxy
rules:
  - name: bypass-local-ss
    action: bypass
    process:
      name: ["sslocal.exe", "v2ray.exe", "xray.exe"]

  - name: bypass-corp-app-to-lan
    action: bypass
    process:
      path: "C:\\Program Files\\CorpApp\\corpapp.exe"
    destination:
      cidrs: ["10.0.0.0/8", "192.168.0.0/16"]
      ports: [443]
      proto: tcp

  - name: force-proxy-browser-https
    action: proxy
    process:
      name: ["chrome.exe", "msedge.exe", "firefox.exe"]
    destination:
      ports: [443]
      proto: tcp
